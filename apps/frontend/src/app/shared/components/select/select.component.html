<div class="flex flex-col gap-3">
  @if (label) {
    <label [for]="id" class="text-sm font-medium text-gray-700">
      {{ label | translate }}
    </label>
  }
  <select
    [id]="id"
    [disabled]="disabled"
    [value]="value"
    (change)="onChange($event)"
    (blur)="onTouched()"
    class="px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan focus:border-transparent disabled:bg-gray-100 disabled:cursor-not-allowed appearance-none bg-white"
  >
    <option value="" disabled selected>{{ placeholder | translate }}</option>
    @for (option of options; track option.value) {
      <option [value]="option.value">
        {{ option.label | translate }}
      </option>
    }
  </select>
</div>
