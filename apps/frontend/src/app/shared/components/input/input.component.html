<div class="flex flex-col gap-1 input-container">
  @if (label) {
    <label [for]="id" class="text-sm font-medium text-gray-700">
      {{ label | translate }}
    </label>
  }
  <input
    [id]="id"
    [type]="type"
    [placeholder]="placeholder | translate"
    [disabled]="disabled"
    [value]="value"
    (input)="onInput($event)"
    (blur)="onTouched()"
    class="px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-cyan focus:border-transparent placeholder:text-gray-400 disabled:bg-gray-100 disabled:cursor-not-allowed"
  />
</div>
