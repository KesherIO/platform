<div class="flex flex-col h-screen bg-gray-50">
  <!-- ─── Top Header ───────────────────────────────────────────────── -->
  <header
    class="relative flex items-center gap-3 bg-white border-b border-gray-200 px-4 py-3 flex-shrink-0"
  >
    <img
      [src]="logoUrl()"
      alt="Clinic logo"
      class="h-8 w-8 rounded-lg object-cover flex-shrink-0"
    />
    <span class="text-sm font-semibold text-gray-800 flex-1 truncate">{{
      clinicName()
    }}</span>

    <!-- Avatar toggle -->
    <button
      type="button"
      (click)="menuOpen.set(!menuOpen())"
      class="h-8 w-8 rounded-full avatar-gradient flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
    >
      {{ userDisplayName().charAt(0).toUpperCase() }}
    </button>

    <!-- User menu dropdown -->
    @if (menuOpen()) {
    <!-- Backdrop — click outside to close -->
    <button
      type="button"
      aria-label="Close menu"
      class="fixed inset-0 z-40 cursor-default bg-transparent border-0 p-0 m-0"
      (click)="menuOpen.set(false)"
    ></button>

    <!-- Card -->
    <div
      class="absolute top-full right-4 mt-2 w-56 bg-white rounded-2xl shadow-lg border border-gray-100 z-50 overflow-hidden"
    >
      <!-- User info -->
      <div class="px-4 py-3 border-b border-gray-100">
        <p class="text-sm font-semibold text-gray-900 truncate">
          {{ userDisplayName() }}
        </p>
        <p class="text-xs text-gray-400 truncate mt-0.5">{{ userEmail() }}</p>
      </div>
      <!-- Settings link -->
      <a
        routerLink="/settings"
        (click)="menuOpen.set(false)"
        class="flex items-center gap-2 px-4 py-3 text-sm text-gray-700 font-medium hover:bg-gray-50 transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-4 h-4 text-gray-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
          />
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
          />
        </svg>
        {{ 'NAV.SETTINGS' | translate }}
      </a>
      <!-- Sign out action -->
      <button
        type="button"
        (click)="signOut()"
        class="w-full text-left px-4 py-3 text-sm text-red-500 font-medium hover:bg-red-50 transition-colors border-t border-gray-100"
      >
        {{ 'AUTH.SIGN_OUT' | translate }}
      </button>
    </div>
    }
  </header>

  <!-- ─── Page Content ─────────────────────────────────────────────── -->
  <main class="flex-1 overflow-y-auto">
    <router-outlet></router-outlet>
  </main>

  <!-- ─── Bottom Navigation ────────────────────────────────────────── -->
  <app-bottom-nav />

  <!-- PWA install prompt — floats over the full layout -->
  <app-pwa-install-banner />
</div>
