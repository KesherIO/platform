<div class="flex flex-col gap-6 px-4 py-6">
  <!-- Greeting -->
  <div>
    <h1 class="text-xl font-bold text-gray-900">
      {{ 'DASHBOARD.HOME.GREETING' | translate : { name: greeting() } }}
    </h1>
    <p class="mt-0.5 text-sm text-gray-500">
      {{ 'DASHBOARD.HOME.SUBTITLE' | translate }}
    </p>
  </div>

  <!-- Metric cards -->
  <div class="grid grid-cols-2 gap-3">
    @for (metric of metrics(); track metric.labelKey) {
    <div
      class="rounded-2xl p-4 flex flex-col gap-3 transition-transform duration-150 active:scale-[0.97]"
      [style.background]="'rgba(' + metric.rgb + ',0.07)'"
      [style.box-shadow]="
        '0 1px 4px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(' +
        metric.rgb +
        ',0.18)'
      "
    >
      <!-- Icon container -->
      <div
        class="w-10 h-10 rounded-xl flex items-center justify-center self-start"
        [style.background]="'rgba(' + metric.rgb + ',0.18)'"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          [style.color]="metric.color"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="1.75"
            [attr.d]="metric.iconPath"
          />
        </svg>
      </div>

      <!-- Number -->
      <p class="text-[28px] font-bold leading-none text-gray-900">
        {{ metric.value }}
      </p>

      <!-- Label -->
      <p class="text-xs text-gray-400 leading-snug -mt-1">
        {{ metric.labelKey | translate }}
      </p>
    </div>
    }
  </div>
</div>
