<div class="flex flex-col gap-3">
  @if (tests().length > 0) {
  <div>
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">
      {{ 'CASES.TEST_SELECTION.TESTS_SECTION' | translate }}
    </p>
    <div class="flex flex-wrap gap-2">
      @for (test of tests(); track test.id) {
      <span
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-cyan bg-opacity-10 text-gray-800 text-xs font-medium rounded-full border border-cyan border-opacity-30"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-cyan"></span>
        {{ test.name }}
      </span>
      }
    </div>
  </div>
  } @if (packages().length > 0) {
  <div>
    <p class="text-xs font-medium text-gray-400 uppercase tracking-wide mb-2">
      {{ 'CASES.TEST_SELECTION.PACKAGES_SECTION' | translate }}
    </p>
    <div class="flex flex-wrap gap-2">
      @for (pkg of packages(); track pkg.id) {
      <span
        class="inline-flex items-center gap-1.5 px-3 py-1.5 bg-purple bg-opacity-10 text-gray-800 text-xs font-medium rounded-full border border-purple border-opacity-30"
      >
        <span class="w-1.5 h-1.5 rounded-full bg-purple"></span>
        {{ pkg.name }}
      </span>
      }
    </div>
  </div>
  }
</div>
