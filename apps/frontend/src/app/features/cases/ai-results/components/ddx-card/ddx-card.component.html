<div class="border border-gray-200 rounded-2xl overflow-hidden bg-white">
  <div class="flex items-start gap-3 p-4">
    <!-- Confidence badge -->
    <div class="flex-shrink-0 flex flex-col items-center">
      <span class="text-[10px] text-gray-400 font-medium leading-none mb-1">
        {{ 'CASES.AI_RESULTS.CONFIDENCE' | translate }}
      </span>
      <span
        class="text-sm font-bold text-white bg-purple px-2.5 py-1 rounded-md min-w-[44px] text-center"
      >
        {{ diagnosis().confidence }}%
      </span>
    </div>

    <!-- Diagnosis info -->
    <div class="flex-1 min-w-0">
      <p class="text-sm font-semibold text-gray-900">{{ diagnosis().name }}</p>

      @if (expanded() && diagnosis().explanation) {
      <p class="text-sm text-gray-500 mt-1">{{ diagnosis().explanation }}</p>
      } @if (diagnosis().explanation) {
      <button
        type="button"
        (click)="toggle()"
        class="text-xs text-cyan font-medium mt-1.5 flex items-center gap-0.5"
      >
        {{ 'CASES.AI_RESULTS.SEE_EXPLANATION' | translate }}
        <svg
          class="w-3 h-3 transition-transform"
          [class.rotate-180]="expanded()"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19 9l-7 7-7-7"
          />
        </svg>
      </button>
      }
    </div>
  </div>
</div>
