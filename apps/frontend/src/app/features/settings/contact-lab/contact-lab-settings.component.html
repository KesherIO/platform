<div class="flex flex-col gap-4 px-4 py-6">
  <!-- ─── Lab Info Card ────────────────────────────────────────────── -->
  <div class="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm">
    <!-- Header -->
    <div class="flex items-center gap-3 mb-5">
      <div
        class="w-12 h-12 rounded-xl bg-cyan/10 flex items-center justify-center shrink-0"
      >
        <svg
          class="w-6 h-6 text-cyan"
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"
          />
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold text-gray-900">
          {{ 'SETTINGS.CONTACT_LAB.TITLE' | translate }}
        </p>
        <p class="text-xs text-gray-400 mt-0.5">
          {{ 'SETTINGS.CONTACT_LAB.SUBTITLE' | translate }}
        </p>
      </div>
    </div>

    <!-- Contact rows -->
    <div class="flex flex-col gap-3 mb-5">
      <!-- Email -->
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center shrink-0"
        >
          <svg
            class="w-4 h-4 text-gray-400"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
            />
          </svg>
        </div>
        <a
          [href]="'mailto:' + lab.email"
          class="text-sm text-gray-700 hover:text-cyan transition-colors"
        >
          {{ lab.email }}
        </a>
      </div>

      <!-- Phone -->
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center shrink-0"
        >
          <svg
            class="w-4 h-4 text-gray-400"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
            />
          </svg>
        </div>
        <a
          [href]="'tel:' + lab.whatsappNumber"
          class="text-sm text-gray-700 hover:text-cyan transition-colors"
        >
          {{ lab.phone }}
        </a>
      </div>

      <!-- Address -->
      <div class="flex items-center gap-3">
        <div
          class="w-8 h-8 rounded-lg bg-gray-50 flex items-center justify-center shrink-0"
        >
          <svg
            class="w-4 h-4 text-gray-400"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </div>
        <span class="text-sm text-gray-700">{{ lab.address }}</span>
      </div>
    </div>

    <!-- WhatsApp CTA -->
    <a
      [href]="labWhatsAppUrl"
      target="_blank"
      rel="noopener noreferrer"
      class="flex items-center justify-center gap-2 w-full rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-sm font-medium text-green-700 hover:bg-green-100 transition-colors"
    >
      <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"
        />
        <path
          d="M12 0C5.373 0 0 5.373 0 12c0 2.117.554 4.103 1.523 5.824L.057 23.882a.75.75 0 00.921.921l6.058-1.466A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.708 9.708 0 01-4.951-1.355l-.355-.21-3.676.89.906-3.567-.23-.368A9.718 9.718 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"
        />
      </svg>
      {{ 'SETTINGS.CONTACT_LAB.WHATSAPP_BTN' | translate }}
    </a>
  </div>

  <!-- ─── Map Card ──────────────────────────────────────────────────── -->
  <div
    class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden"
  >
    <div class="px-5 py-3 border-b border-gray-50">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">
        {{ 'SETTINGS.CONTACT_LAB.LOCATION_TITLE' | translate }}
      </p>
    </div>
    <iframe
      [src]="mapEmbedUrl"
      class="w-full h-52 border-0"
      loading="lazy"
      title="Biomet Lab location"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</div>
