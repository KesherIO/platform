<div class="flex flex-col h-screen">
  <!-- ─── Page Header ──────────────────────────────────────────────── -->
  <div class="px-4 pt-6 pb-2 flex items-center gap-3">
    <button type="button" (click)="goBack()" class="p-1 -ml-1 text-gray-500">
      <svg
        class="w-5 h-5"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
    </button>
    <h1 class="text-xl font-bold text-gray-900">
      {{ 'SETTINGS.TITLE' | translate }}
    </h1>
  </div>

  <!-- ─── Tab Strip ────────────────────────────────────────────────── -->
  <div class="flex border-b border-gray-200 bg-white px-2">
    @for (tab of tabs(); track tab.key) {
    <button
      type="button"
      (click)="activeTab.set(tab.key)"
      class="py-3 px-4 text-sm font-medium border-b-2 transition-colors"
      [class]="
        activeTab() === tab.key
          ? 'border-secondary text-secondary'
          : 'border-transparent text-gray-400 hover:text-gray-600'
      "
    >
      {{ tab.labelKey | translate }}
    </button>
    }
  </div>

  <!-- ─── Tab Content ──────────────────────────────────────────────── -->
  <div class="flex-1 overflow-y-auto">
    @if (activeTab() === 'clinic') {
    <app-clinic-settings />
    } @else if (activeTab() === 'staff') {
    <app-staff-settings />
    } @else if (activeTab() === 'profile') {
    <app-profile-settings />
    }
  </div>

  <app-bottom-nav />
</div>
