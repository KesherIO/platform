<div class="min-h-screen flex items-center justify-center bg-gray-50">
  @if (error.message) {
    <div class="max-w-sm text-center space-y-4">
      <p class="text-red-600 text-sm">{{ error.message }}</p>
      <a routerLink="/auth/login" class="text-cyan text-sm underline">
        {{ 'AUTH.BACK_TO_LOGIN' | translate }}
      </a>
    </div>
  } @else {
    <div class="flex flex-col items-center gap-3 text-gray-500">
      <svg class="animate-spin h-8 w-8 text-cyan" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
      </svg>
      <p class="text-sm">{{ 'COMMON.LOADING' | translate }}</p>
    </div>
  }
</div>
