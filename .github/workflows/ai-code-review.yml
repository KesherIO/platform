name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: AI Code Review
        uses: villesau/ai-code-reviewer@v2
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_MODEL: gpt-5-mini
          exclude: |
            **/package-lock.json
            **/dist/**
            **/coverage/**
            **/node_modules/**
            **/.prisma/**
            **/*.snap